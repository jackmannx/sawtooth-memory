name: Benchmark Suite

on:
  push:
    branches: [main, master]
    paths:
      - "benchmarks/**"
      - "sawtooth_memory/**"
      - "pyproject.toml"
  pull_request:
    branches: [main, master]
    paths:
      - "benchmarks/**"
      - "sawtooth_memory/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  microbenchmarks:
    name: Microbenchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,langgraph]"

      - name: Run microbenchmarks
        run: |
          # Smoke test only — do not compare against micro_baseline.json here.
          # That baseline was captured on a developer machine (CPU/Python version
          # differ from GitHub Actions runners, so cross-machine compare fails).
          # Use the local regression gate documented in BENCHMARKS.md instead.
          pytest benchmarks/micro \
            --benchmark-only \
            --benchmark-min-rounds=3 \
            -q

  scenario-benchmarks:
    name: Scenario benchmarks (mock E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,langgraph]"

      - name: Run integration scenario benchmarks
        run: |
          pytest benchmarks/scenarios -m integration_benchmark -q

  harness-smoke:
    name: Harness smoke (mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run mock harness
        run: |
          python scripts/run_benchmarks.py harness --turns 10 --mode mock
